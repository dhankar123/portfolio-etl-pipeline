version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: portfolio_etl_postgres
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_password
      POSTGRES_DB: etl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    container_name: portfolio_etl_runner
    environment:
      ENABLE_POSTGRES_LOAD: "true"
      POSTGRES_URL: postgresql+psycopg://etl_user:etl_password@postgres:5432/etl_db
      POSTGRES_TABLE_NAME: sales_curated
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

volumes:
  postgres_data:
